; PRINT_END_COOLDOWN MUST run before PRINT_END -- stock PRINT_END turns the bed
; off, which would short-circuit the cooldown ramp. Cooldown is a no-op for
; standard materials (gated by FILAMENTS list in print_macros.cfg), so this
; line is safe to leave unconditional for every print.
PRINT_END_COOLDOWN FILAMENTS="[filament_type]"
PRINT_END
TIMELAPSE_STOP
