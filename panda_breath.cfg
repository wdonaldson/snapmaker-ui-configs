# Panda Breath Klipper integration
# Generated by install.sh. Edit values here, then restart Klipper.

[panda_breath]
firmware: stock
host: 192.168.4.30
port: 80

[heater_generic panda_breath]
heater_pin: panda_breath:pwm
sensor_type: panda_breath
control: watermark
max_delta: 0.5
min_temp: 15
max_temp: 80

[verify_heater panda_breath]
check_gain_time: 360
hysteresis: 5
heating_gain: 1

[gcode_macro M141]
description: Set chamber temperature (heat with Klipper, hold/cool with Panda auto)
gcode:
    {% set s = params.S|default(0)|float %}
    {% set current = printer["heater_generic panda_breath"].temperature|float %}
    {% set tolerance = 0.5 %}
    {% set filtertemp = params.FILTERTEMP|default(30)|int %}
    {% set hotbedtemp = params.HOTBEDTEMP|default(80)|int %}
    {% if s <= 0 %}
        PANDA_BREATH_AUTO ENABLE=0
        SET_HEATER_TEMPERATURE HEATER="panda_breath" TARGET=0
    {% elif s > (current + tolerance) %}
        SET_HEATER_TEMPERATURE HEATER="panda_breath" TARGET={s}
    {% else %}
        PANDA_BREATH_AUTO ENABLE=1 TARGET={s} FILTERTEMP={filtertemp} HOTBEDTEMP={hotbedtemp}
    {% endif %}

[gcode_macro M191]
description: Reach and hold chamber temperature; push bed to 100C to accelerate via radiation
gcode:
    {% set s = params.S|default(0)|float %}
    {% set current = printer["heater_generic panda_breath"].temperature|float %}
    {% set tolerance = 0.5 %}
    {% set filtertemp = params.FILTERTEMP|default(30)|int %}
    {% set hotbedtemp = params.HOTBEDTEMP|default(80)|int %}
    {% if s > (current + tolerance) %}
        M140 S100
        RESPOND MSG="Chamber pre-heat: bed at 100C to assist chamber rise via radiation"
    {% endif %}
    {% if s <= 0 %}
        M141 S0
    {% elif (current + tolerance) < s %}
        SET_HEATER_TEMPERATURE HEATER="panda_breath" TARGET={s}
        TEMPERATURE_WAIT SENSOR="heater_generic panda_breath" MINIMUM={s}
        PANDA_BREATH_AUTO ENABLE=1 TARGET={s} FILTERTEMP={filtertemp} HOTBEDTEMP={hotbedtemp}
    {% else %}
        PANDA_BREATH_AUTO ENABLE=1 TARGET={s} FILTERTEMP={filtertemp} HOTBEDTEMP={hotbedtemp}
        TEMPERATURE_WAIT SENSOR="heater_generic panda_breath" MAXIMUM={s + tolerance}
    {% endif %}
