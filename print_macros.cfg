#################################################################
###   PRINT_WARMUP / PRINT_START - U1 ASA / high-temp filament
###   Conditional chamber heat-soak based on filament types
###   passed in from the slicer.
###
###   Depends on heatsoak.cfg (HEAT_SOAK macro by garethky).
###   Include this file AFTER heatsoak.cfg in printer.cfg.
#################################################################

[gcode_macro PRINT_WARMUP]
description: Initial heating + conditional chamber soak based on filament types
gcode:
    {% set extruder_t = params.EXTRUDER|default(220)|float %}
    {% set bed_t      = params.BED|default(60)|float %}
    {% set filaments  = params.FILAMENTS|default("")|upper %}

    # RESPOND MSG="PRINT_WARMUP: filaments={filaments}, bed={bed_t}, extruder={extruder_t}"  # dev-time diagnostic

    # Materials that warrant a chamber heat-soak on the U1.
    # Curated against Snapmaker's "requires Top Cover" compatibility list
    # plus common CF/GF variants. PETG and PCTG intentionally excluded
    # (they print best in an unheated/lightly-warmed chamber).
    # To extend, just add new entries here. Comparison is exact-match
    # against semicolon-split filament names (case-insensitive).
    {% set high_temp = [
        "ABS",  "ABS-CF",  "ABS-GF",
        "ASA",  "ASA-CF",  "ASA-GF",
        "PC",   "PC-CF",   "PC-GF",   "PC-FR",
        "PA",   "PA-CF",   "PA-GF",
        "PA6",  "PA6-CF",  "PA6-GF",
        "PA12", "PA12-CF", "PA12-GF",
        "PAHT", "PAHT-CF",
        "PET",  "PET-CF",  "PET-GF"
    ] %}

    {% set ns = namespace(needs_soak=false) %}
    {% for f in filaments.split(";") %}
        {% if f.strip() in high_temp %}
            {% set ns.needs_soak = true %}
        {% endif %}
    {% endfor %}

    # RESPOND MSG="PRINT_WARMUP: needs_soak={ns.needs_soak}"  # dev-time diagnostic

    M117 Filaments: {filaments}

    M104 S{extruder_t * 0.6}        # pre-warm nozzle to ~60% to reduce ooze during soak
    M140 S{bed_t}                    # bed on, no wait
    G28                              # home

    {% if ns.needs_soak %}
        # RESPOND MSG="PRINT_WARMUP: starting heat soak"  # dev-time diagnostic
        M117 Heat-soaking for high-temp material
        # HEAT_SOAK MUST be the last line - it pauses the print, PRINT_START resumes after.
        # SOAK_TEMP=45 is realistic for U1's passive top cover; bump if your room is warm.
        # TIMEOUT=45 minutes is a safe upper bound; adjust based on observation.
        # FAN=cavity_fan FAN_SPEED=X.XX -- chamber recirc fan during soak. Applied AFTER PAUSE
        # inside HEAT_SOAK (see heatsoak.cfg U1 mod) because Fluidd's PAUSE clears fan states,
        # so SET_FAN_SPEED issued before HEAT_SOAK gets nullified before the soak even starts.
        # Empirical-tuning value -- step up (0.25 -> 0.40 -> 0.60) across runs and compare HEAT_SOAK TOTAL.
        # No explicit fan-off needed; Snapmaker's stock start g-code issues M106 P2 S0 post-soak.
        # *_REPORT_INTERVAL=99999 silences per-tick "Heating --" / "Soaking --" console spam.
        # The start/end summaries ("Heat Soak starting", "Heating completed", "Heat soak complete",
        # "HEAT_SOAK TOTAL") are ungated and always fire, so we still get the useful timing data.
        HEAT_SOAK HEATER=heater_bed TARGET={bed_t} SOAKER='temperature_sensor cavity' SOAK_TEMP=45 RATE=0.1 RATE_SMOOTH=30 TIMEOUT=45 CANCEL=CANCEL_PRINT FAN=cavity_fan FAN_SPEED=0.25 HEATING_REPORT_INTERVAL=99999 SOAKING_REPORT_INTERVAL=99999
    {% else %}
        # RESPOND MSG="PRINT_WARMUP: no soak needed, waiting for bed"  # dev-time diagnostic
        M117 Standard material - no soak needed
        M190 S{bed_t}                # just wait for bed normally
    {% endif %}


[gcode_macro PRINT_START]
description: Runs after PRINT_WARMUP completes (post-soak or non-soak path)
gcode:
    {% set extruder_t = params.EXTRUDER|default(220)|float %}
    {% set bed_t      = params.BED|default(60)|float %}

    # Safety net: ensure homed and bed at target if PRINT_WARMUP was skipped
    {% if not 'xyz' in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    M190 S{bed_t}                    # ensure bed at target
    M109 S{extruder_t}               # final hotend heat + wait

    # Default bed mesh is loaded on Klipper startup by [delayed_gcode bed_mesh_init]
    # in printer.cfg, so no explicit BED_MESH_PROFILE LOAD needed here.
    # Add a purge line / nozzle wipe / first-layer prep here if desired.

    M117 Starting print
