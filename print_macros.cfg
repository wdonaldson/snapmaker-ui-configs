#################################################################
###   PRINT_WARMUP / PRINT_START / PRINT_END_COOLDOWN
###   U1 high-temp filament workflow:
###     - PRINT_WARMUP: pre-heat nozzle and bed for any print
###     - PRINT_END_COOLDOWN: conditional gradual bed + chamber cooldown
###       for ASA/ABS/PC/PA (gated by _HIGH_TEMP_FILAMENTS list below)
###
###   Chamber heating is handled by the slicer via M141/M191 (Orca's
###   per-filament "Activate chamber temperature control"), routed to the
###   BIQU Panda Breath through the pandabreath-klipper plugin.
###
###   heatsoak.cfg is no longer required — the slicer + Panda Breath bridge
###   replace what HEAT_SOAK did. See README "Status" section for context.
#################################################################

# Source-of-truth for filaments that get the post-print gradual cooldown ramp.
# Curated against Snapmaker's "requires Top Cover" compatibility list plus common
# CF/GF variants. PETG/PCTG intentionally excluded (low warp tendency).
# Comma-separated, no spaces. Comparison in PRINT_END_COOLDOWN is exact-match
# against semicolon-split filament names (case-insensitive).
[gcode_macro _HIGH_TEMP_FILAMENTS]
variable_list: "ABS,ABS-CF,ABS-GF,ASA,ASA-CF,ASA-GF,PC,PC-CF,PC-GF,PC-FR,PA,PA-CF,PA-GF,PA6,PA6-CF,PA6-GF,PA12,PA12-CF,PA12-GF,PAHT,PAHT-CF,PET,PET-CF,PET-GF"
gcode:
    # Config-only; never invoked. Klipper requires a gcode: field on every macro.

# M191 override for pandabreath-klipper (bed-assist version). Moved to
# panda_breath.cfg so a single file covers the full Panda Breath config.
# The override pushes the bed to 100C during the chamber preheat wait —
# without it the Panda Breath heats the chamber alone (~20 min for a
# 25C->55C climb); with the bed at 100C contributing radiation, the same
# climb takes ~5-8 min. See panda_breath.cfg for the macro.

[gcode_macro PRINT_WARMUP]
description: Pre-heat nozzle and bed. Chamber heating + waits are handled by the
   slicer's per-filament M141/M191 (routed to Panda Breath via the bridge plugin).
gcode:
    {% set extruder_t = params.EXTRUDER|default(220)|float %}
    {% set bed_t      = params.BED|default(60)|float %}
    {% set filaments  = params.FILAMENTS|default("")|upper %}

    M117 Filaments: {filaments}

    M104 S{extruder_t * 0.6}        # pre-warm nozzle to ~60% to reduce ooze during heat-up
    M140 S{bed_t}                    # bed on, at slicer's print temp (no longer pushed to 100)
    G28                              # home
    M190 S{bed_t}                    # wait for bed at target


[gcode_macro PRINT_START]
description: Runs after PRINT_WARMUP completes (post-soak or non-soak path)
gcode:
    {% set extruder_t = params.EXTRUDER|default(220)|float %}
    {% set bed_t      = params.BED|default(60)|float %}

    # Safety net: ensure homed and bed at target if PRINT_WARMUP was skipped
    {% if not 'xyz' in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    M190 S{bed_t}                    # ensure bed at target
    M109 S{extruder_t}               # final hotend heat + wait

    # Default bed mesh is loaded on Klipper startup by [delayed_gcode bed_mesh_init]
    # in printer.cfg, so no explicit BED_MESH_PROFILE LOAD needed here.
    # Add a purge line / nozzle wipe / first-layer prep here if desired.

    M117 Starting print


[gcode_macro PRINT_END_COOLDOWN]
description: Conditional gradual bed + chamber cooldown to relieve thermal stress for
   high-temp filaments (ASA, ABS, PC, PA, etc). Must run BEFORE stock PRINT_END so
   parking and cleanup happen after cooldown completes. No-op for standard materials
   -- safe to call unconditionally from the slicer end g-code.
   Requires pandabreath-klipper plugin (github.com/justinh-rahb/pandabreath-klipper)
   installed so [heater_generic panda_breath] exists. Without it, the
   SET_HEATER_TEMPERATURE HEATER=panda_breath calls will throw -- comment them out
   and set the chamber manually on the Panda Breath controller.
gcode:
    {% set filaments = params.FILAMENTS|default("")|upper %}

    {% set high_temp = printer["gcode_macro _HIGH_TEMP_FILAMENTS"].list.split(",") %}

    {% set ns = namespace(needs_cooldown=false) %}
    {% for f in filaments.split(";") %}
        {% if f.strip() in high_temp %}
            {% set ns.needs_cooldown = true %}
        {% endif %}
    {% endfor %}

    # RESPOND MSG="PRINT_END_COOLDOWN: needs_cooldown={ns.needs_cooldown}, filaments={filaments}"  # dev-time diagnostic

    {% if ns.needs_cooldown %}
        M117 Cooldown ramp - leave part on bed
        RESPOND MSG="Cooldown starting (~4hr conservative ramp for high-temp filament)"
        M104 S0                          # hotend off immediately; bed + chamber do the work

        # Hold chamber at its 60C ceiling through the entire bed Tg-crossing window
        # (100-80C bed for ASA/ABS, Tg ~100-105C). The warp force is the bed-to-air
        # temperature gradient while the part is still above Tg; minimizing that
        # gradient is the whole point of this ramp. Once past Tg, walk chamber down
        # in parallel with the bed so the gradient grows gradually rather than in a
        # step. Panda Breath max_temp is configured at 70C in [heater_generic
        # panda_breath]; 60C target is the device's rated ceiling.
        SET_HEATER_TEMPERATURE HEATER=panda_breath TARGET=60

        # Cavity fan circulates chamber-heater output for even distribution.
        # Same speed as heat-soak (0.25). Off after the bed=70 step.
        SET_FAN_SPEED FAN=cavity_fan SPEED=0.25

        # Stepped bed cooldown. Dwell weights heavily biased toward 100-80C where
        # ASA-class materials cross Tg and stress relief actually happens. G4 dwells
        # block; once started this sequence runs to completion (no cancellation).
        # Total: ~240 min (~4 hrs). Conservative by design -- most ASA prints run
        # overnight, so cooldown finishing in the morning is a feature, not a cost.
        # Bed holds the most-recent M140 setpoint between dwells.
        M140 S100
        G4 P3000000                      # 50 min @ 100C - initial stress relax at/above Tg
        M140 S95
        G4 P1500000                      # 25 min @ 95C  - top of Tg-crossing zone
        M140 S90
        G4 P1500000                      # 25 min @ 90C
        M140 S85
        G4 P1500000                      # 25 min @ 85C
        M140 S80
        G4 P1500000                      # 25 min @ 80C  - still well inside Tg zone

        # Leaving the Tg-critical zone. Begin walking chamber down with the bed so
        # the bed-to-air gradient grows gradually rather than in a step.
        RESPOND MSG="Cooldown: Tg zone complete, chamber walking down (~150 min elapsed, ~90 min remaining)"
        SET_HEATER_TEMPERATURE HEATER=panda_breath TARGET=55

        M140 S75
        G4 P1200000                      # 20 min @ 75C  - bottom of Tg-crossing zone

        SET_HEATER_TEMPERATURE HEATER=panda_breath TARGET=45

        M140 S70
        G4 P1200000                      # 20 min @ 70C

        # Bed past the warp-critical window. Release cavity-fan circulation; chamber
        # continues a gentler ramp so part-to-air gradient stays modest as bed cools.
        RESPOND MSG="Cooldown: post-Tg, cavity fan off (~190 min elapsed, ~50 min remaining)"
        SET_FAN_SPEED FAN=cavity_fan SPEED=0
        SET_HEATER_TEMPERATURE HEATER=panda_breath TARGET=35

        M140 S65
        G4 P900000                       # 15 min @ 65C
        M140 S60
        G4 P900000                       # 15 min @ 60C

        # Chamber heater off; part is set, residual drift can't drive warp.
        RESPOND MSG="Cooldown: chamber off, bed passive ramp to 50C (~220 min elapsed, ~20 min remaining)"
        SET_HEATER_TEMPERATURE HEATER=panda_breath TARGET=0

        M140 S55
        G4 P600000                       # 10 min @ 55C
        M140 S50
        G4 P600000                       # 10 min @ 50C  - finish ramp; passive from here
        M140 S0                          # bed off; stock PRINT_END handles parking/motors
        M117 Cooldown complete
        RESPOND MSG="Cooldown complete - safe to remove part"
    {% endif %}
